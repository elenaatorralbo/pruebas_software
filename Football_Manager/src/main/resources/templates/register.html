<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-6">Register</h2>

        <div th:if="${error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${registerDTO}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Name</label>
                <input type="text" th:field="*{name}" class="w-full border p-2 rounded" required>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                      class="text-red-600 text-sm"></span>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" th:field="*{email}" class="w-full border p-2 rounded" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                      class="text-red-600 text-sm"></span>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" th:field="*{password}" class="w-full border p-2 rounded" required>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                      class="text-red-600 text-sm"></span>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                Register
            </button>
        </form>

        <p class="mt-4 text-center text-sm">
            Already have an account?
            <a th:href="@{/login}" class="text-blue-600 hover:underline">Login</a>
        </p>
    </div>
</body>
</html>
