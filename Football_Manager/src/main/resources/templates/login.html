<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-6">Login</h2>

        <div th:if="${param.error}" class="mb-4 p-3 bg-red-100 text-red-700 rounded">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="mb-4 p-3 bg-green-100 text-green-700 rounded">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" class="mb-4 p-3 bg-green-100 text-green-700 rounded">
            Registration successful! Please log in.
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="username" class="w-full border p-2 rounded"
                       required placeholder="email@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" name="password" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-sm">
            Don't have an account?
            <a th:href="@{/register}" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>
</body>
</html>
