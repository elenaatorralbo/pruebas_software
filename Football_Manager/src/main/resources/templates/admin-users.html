<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
<div class="max-w-3xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Create User / Admin</h1>
        <a href="/admin" class="bg-gray-600 text-white px-4 py-2 rounded">Back</a>
    </div>

    <div class="bg-white p-6 rounded shadow">
        <form action="/admin/users" method="post" class="space-y-4">
            <input type="text" name="username" placeholder="Username" class="w-full border p-2 rounded" required>
            <input type="email" name="email" placeholder="Email" class="w-full border p-2 rounded" required>
            <input type="password" name="password" placeholder="Password" class="w-full border p-2 rounded" required>

            <label class="flex items-center gap-2">
                <input type="checkbox" name="isAdmin" value="true">
                <span>Make this user admin</span>
            </label>

            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
                Create user
            </button>
        </form>
    </div>
</div>
</body>
</html>
