<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Countries</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Manage Countries</h1>
        <a href="/admin" class="bg-gray-600 text-white px-4 py-2 rounded">Back</a>
    </div>

    <div class="bg-white p-6 rounded shadow mb-6">
        <form action="/admin/countries" method="post" class="flex gap-3">
            <input type="text" name="name" placeholder="Country name" class="border p-2 rounded w-full" required>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
        </form>
    </div>

    <div class="space-y-3">
        <div th:each="country : ${countries}" class="bg-white p-4 rounded shadow flex justify-between">
            <span th:text="${country.name}"></span>
            <form th:action="@{/admin/countries/delete/{id}(id=${country.id})}" method="post">
                <button type="submit" class="bg-red-600 text-white px-3 py-1 rounded">Delete</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
