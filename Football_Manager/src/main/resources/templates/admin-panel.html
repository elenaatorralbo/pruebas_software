<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-10">
<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Admin Panel</h1>
        <a href="/teams" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
            Back to teams
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <a href="/teams/add" class="bg-white p-6 rounded-lg shadow hover:shadow-lg block">
            <h2 class="text-xl font-semibold mb-2">Create Team</h2>
            <p class="text-gray-600">Add a new football team.</p>
        </a>

        <a href="/matches/schedule" class="bg-white p-6 rounded-lg shadow hover:shadow-lg block">
            <h2 class="text-xl font-semibold mb-2">Schedule Match</h2>
            <p class="text-gray-600">Create a new match.</p>
        </a>

        <a href="/admin/countries" class="bg-white p-6 rounded-lg shadow hover:shadow-lg block">
            <h2 class="text-xl font-semibold mb-2">Manage Countries</h2>
            <p class="text-gray-600">Create and delete countries.</p>
        </a>

        <a href="/admin/users" class="bg-white p-6 rounded-lg shadow hover:shadow-lg block">
            <h2 class="text-xl font-semibold mb-2">Manage Admin Users</h2>
            <p class="text-gray-600">Create admin or normal users.</p>
        </a>
    </div>
</div>
</body>
</html>
