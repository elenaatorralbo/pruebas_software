<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-6">Login</h2>

        <div id="message" class="hidden mb-4 p-3 rounded"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium mb-1">Username</label>
                <input id="username" type="text" name="username" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium mb-1">Password</label>
                <input id="password" type="password" name="password" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-sm">
            Don't have an account?
            <a href="/register" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const message = document.getElementById('message');

        function showMessage(text, isError) {
            message.textContent = text;
            message.className = isError
                ? 'mb-4 p-3 bg-red-100 text-red-700 rounded'
                : 'mb-4 p-3 bg-green-100 text-green-700 rounded';
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(loginForm);
            const payload = {
                username: formData.get('username'),
                password: formData.get('password')
            };

            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) {
                showMessage(data.message || 'Login failed', true);
                return;
            }

            showMessage('Login successful. Redirecting...', false);
            window.location.href = '/teams';
        });
    </script>
</body>
</html>
